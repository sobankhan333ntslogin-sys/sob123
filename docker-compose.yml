version: '3.9'

services:

  nextjs-app:
    build: .

    container_name: nextjs-container

    ports:
      - "3000:3000"

    environment:
      MONGODB_URI: mongodb://mongodb:27017/ecommerce-db
      NODE_ENV: production

    depends_on:
      - mongodb

  mongodb:
    image: mongo:7

    container_name: mongodb-container

    restart: always

    ports:
      - "27017:27017"

    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: