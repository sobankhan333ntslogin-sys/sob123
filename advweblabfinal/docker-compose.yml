services:
  mongo:
    image: mongo:6.0
    container_name: recipehub-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

  redis:
    image: redis:7.0-alpine
    container_name: recipehub-redis
    ports:
      - "6379:6379"
    restart: always

  backend:
    build:
      context: ./backend
    container_name: recipehub-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/recipehub
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=supersecretkeyforrecipehubjwt12345
      - JWT_EXPIRE=30d
      - NODE_ENV=production
    depends_on:
      - mongo
      - redis
    restart: always

  frontend:
    build:
      context: ./frontend
    container_name: recipehub-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    restart: always

volumes:
  mongo-data:
